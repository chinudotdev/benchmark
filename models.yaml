# LLM Benchmark Model Registry
# Add new models here — the benchmark script picks them up automatically
#
# Fields:
#   id          : HuggingFace model ID
#   name        : human-readable label for reports
#   quant       : quantization to use (none, int8, int4, awq, fp8)
#   min_vram_gb : minimum VRAM required (script skips if GPU has less)
#   tp           : tensor parallel size (number of GPUs)
#   extra_flags : any additional vLLM flags for this model

models:
  # --- 7-8B class (fast iteration, baseline) ---
  - id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    name: DeepSeek-R1-Distill-Qwen-7B
    quant: none
    min_vram_gb: 16
    tp: 1
    extra_flags: ""

  - id: Qwen/Qwen3-8B
    name: Qwen3-8B
    quant: none
    min_vram_gb: 18
    tp: 1
    extra_flags: "--reasoning-parser qwen3 --enable-prefix-caching"

  # --- 14B class (mid-tier) ---
  - id: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
    name: DeepSeek-R1-Distill-Qwen-14B
    quant: none
    min_vram_gb: 30
    tp: 1
    extra_flags: ""

  - id: Qwen/Qwen3-14B
    name: Qwen3-14B
    quant: none
    min_vram_gb: 30
    tp: 1
    extra_flags: "--reasoning-parser qwen3 --enable-prefix-caching"

  # --- 32B class (VRAM ceiling test) ---
  - id: Qwen/Qwen3-32B
    name: Qwen3-32B-INT8
    quant: int8
    min_vram_gb: 36
    tp: 1
    extra_flags: "--reasoning-parser qwen3 --enable-prefix-caching"

  # --- 70B class (requires quantization on single A100) ---
  - id: meta-llama/Llama-3.3-70B-Instruct
    name: Llama-3.3-70B-AWQ
    quant: awq
    min_vram_gb: 42
    tp: 1
    extra_flags: ""
