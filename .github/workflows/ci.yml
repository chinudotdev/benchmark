name: CI

on:
  push:
    branches: [main, rewrite/go]
  pull_request:
    branches: [main, rewrite/go]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o gpu-benchmark ./cmd/gpu-benchmark

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gpu-benchmark-linux-amd64-go${{ matrix.go-version }}
          path: gpu-benchmark

  cross-compile:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cross-compile
        run: make cross-compile

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpu-benchmark-binaries
          path: dist/
